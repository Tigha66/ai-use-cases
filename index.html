<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Business Use Cases - Real Prompts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Outfit', system-ui, sans-serif; }
    body { background-color: #09090b; }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: translateY(-4px); border-color: rgba(249, 115, 22, 0.3); }
    .tag { transition: all 0.2s ease; }
    .tag:hover { background: rgba(249, 115, 22, 0.1); color: #f97316; }
    .filter-active { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%) !important; color: #09090b !important; }
    .copy-btn:active { transform: scale(0.95); }
  </style>
</head>
<body class="min-h-screen text-white">
  <!-- Header -->
  <header class="border-b border-zinc-800 sticky top-0 bg-zinc-950/80 backdrop-blur-xl">
    <div class="max-w-6xl mx-auto px-6 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center">
            <i class="ph ph-robot text-white text-xl"></i>
          </div>
          <div>
            <span class="text-xl font-bold">AI Business</span>
            <span class="text-orange-500">Use Cases</span>
          </div>
        </div>
        <nav class="flex items-center gap-4">
          <span id="count" class="text-sm text-zinc-500"></span>
          <a href="https://github.com/Tigha66/ai-use-cases" target="_blank" class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-zinc-400 hover:text-orange-500">
            <i class="ph ph-github-logo"></i> GitHub
          </a>
        </nav>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="py-16 px-6">
    <div class="max-w-3xl mx-auto text-center">
      <h1 class="text-4xl font-bold mb-4">Real Prompts That Work</h1>
      <p class="text-zinc-400 mb-8">Proven prompts from the OpenClaw community. Copy, adapt, and use them.</p>
      
      <!-- Search -->
      <div class="relative max-w-xl mx-auto">
        <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 text-xl"></i>
        <input type="text" id="search" placeholder="Search prompts..." 
          class="w-full bg-zinc-900 border border-zinc-800 rounded-xl pl-12 pr-4 py-4 text-white focus:border-orange-500 focus:outline-none">
      </div>
    </div>
  </section>

  <!-- Filters -->
  <section class="px-6 mb-8">
    <div class="max-w-6xl mx-auto">
      <div class="flex flex-wrap gap-2" id="filters">
        <button data-filter="all" class="filter-active px-4 py-2 rounded-lg text-sm font-medium bg-zinc-800 text-white">All</button>
        <button data-filter="automation" class="px-4 py-2 rounded-lg text-sm font-medium bg-zinc-800 text-zinc-400 tag">Automation</button>
        <button data-filter="outreach" class="px-4 py-2 rounded-lg text-sm font-medium bg-zinc-800 text-zinc-400 tag">Outreach</button>
        <button data-filter="project" class="px-4 py-2 rounded-lg text-sm font-medium bg-zinc-800 text-zinc-400 tag">Project Mgmt</button>
        <button data-filter="customer" class="px-4 py-2 rounded-lg text-sm font-medium bg-zinc-800 text-zinc-400 tag">Customer Service</button>
      </div>
    </div>
  </section>

  <!-- Use Cases Grid -->
  <section class="px-6 pb-16">
    <div class="max-w-6xl mx-auto">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="useCasesGrid">
      </div>
    </div>
  </section>

  <footer class="py-8 text-center text-zinc-500 text-sm border-t border-zinc-800">
    <p>AI Business Use Cases © 2026 · Source: awesome-openclaw-usecases</p>
  </footer>

  <script>
    // Real prompts from OpenClaw community
    const useCases = [
      {
        id: 1,
        category: "automation",
        title: "Daily Reddit Digest",
        description: "Get top posts from your favorite subreddits every day automatically",
        prompt: `I want you to give me the top performing posts from the following subreddits.
[paste your list here]
Create a separate memory for the reddit processes, about the type of posts I like to see and every day ask me if I liked the list you provided. Save my preference as rules in the memory to use for a better digest curation. (e.g. do not include memes.)
Every day at 5pm, run this process and give me the digest.`,
        tags: ["reddit", "automation", "digest"]
      },
      {
        id: 2,
        category: "project",
        title: "Autonomous Project Management",
        description: "Manage complex projects with subagents using STATE.yaml pattern",
        prompt: `I want you to manage my [project name] project using the STATE.yaml pattern.

Create a STATE.yaml file with these sections:
- project: [name]
- tasks: [array of tasks with id, status, owner, notes]
- next_actions: [what to do next]

Rules:
1. Spawn subagents for each task
2. Subagents update STATE.yaml on progress
3. Other agents poll STATE.yaml for unblocked work
4. Report status to me periodically`,
        tags: ["subagents", "coordination", "tasks"]
      },
      {
        id: 3,
        category: "customer",
        title: "Multi-Channel Customer Service",
        description: "Unified inbox for WhatsApp, Instagram, Email, and Google Reviews",
        prompt: `Set up an AI customer service system that handles:
- WhatsApp Business messages
- Instagram DMs  
- Gmail emails
- Google Reviews responses

Rules:
1. Auto-respond to FAQs about our services
2. Escalate complex issues to me
3. Use test mode for demo purposes
4. Train on our services, pricing, and policies`,
        tags: ["whatsapp", "instagram", "unified-inbox"]
      },
      {
        id: 4,
        category: "outreach",
        title: "Cold Email - Free AI Receptionist",
        description: "Email offering free setup to local businesses",
        prompt: `Subject: Free AI receptionist for [Business Name]

Hi [Name],

Quick question - when you're busy on a job or after hours, what happens to your phone calls? Do they go to voicemail?

I help local businesses with an AI receptionist that answers calls 24/7. It books appointments, takes messages, handles questions - all automatically.

Here's what I'd like to do: I'll set it up completely FREE for you. No cost, no strings. Try it for 14 days. If you love it, it's £89/month. If not, you walk away.

Fair?

Cheers,
Abdelhak`,
        tags: ["cold-email", "plumber", "electrician"]
      },
      {
        id: 5,
        category: "outreach",
        title: "Cold Call Script",
        description: "5-minute cold call for booking demos",
        prompt: `Opening:
"Hi, is this [Business]? Great. I'm [Your Name]. I help local businesses with an AI receptionist that answers calls 24/7."

Problem:
"Quick question - when you're busy on a job or after hours, what happens to your phone calls?"

Solution:
"What I do is set up an AI receptionist - a virtual person who answers your calls. They book appointments, take messages, answer questions."

Offer:
"Here's what I'd like to do - set it up FREE for you. 14-day trial. £89/month if you love it. Fair?"

Close:
"Can I book you a 5-minute demo?"`,
        tags: ["cold-call", "sales", "script"]
      },
      {
        id: 6,
        category: "automation",
        title: "YouTube Content Pipeline",
        description: "Automate video idea scouting and research",
        prompt: `Create an automated YouTube content pipeline:
1. Monitor trending topics in [your niche]
2. Research competitor channels
3. Generate video ideas with hooks
4. Track weekly content performance
5. Every Monday at 9am, give me a content brief`,
        tags: ["youtube", "content", "automation"]
      },
      {
        id: 7,
        category: "project",
        title: "Multi-Agent Team",
        description: "Run specialized agents as a coordinated team",
        prompt: `Set up a multi-agent team with these roles:
- CEO Agent: Makes strategic decisions
- Developer Agent: Writes code, builds apps
- Marketer Agent: Creates content, runs outreach
- Researcher Agent: Finds leads, verifies info
- Assistant Agent: Handles scheduling, follow-ups

Coordinate through a shared task board. Each agent reports progress.`,
        tags: ["team", "agents", "coordination"]
      },
      {
        id: 8,
        category: "automation",
        title: "Custom Morning Brief",
        description: "Get a personalized daily briefing every morning",
        prompt: `Every morning at 7am, give me a custom briefing including:
1. Top 3 tasks for today (from my priorities)
2. Any meetings or appointments
3. Relevant news for [your industry]
4. Quick wins I can accomplish today
5. One AI-recommended action

Format: Short, scannable, action-oriented`,
        tags: ["briefing", "morning", "productivity"]
      },
      {
        id: 9,
        category: "customer",
        title: "Event Guest Confirmation",
        description: "Automate event RSVPs via AI voice calls",
        prompt: `I need to call my event guests to confirm attendance.
For each guest:
1. Call them and confirm if they can attend
2. Ask for +1s or dietary requirements
3. Take notes
4. Update the guest list

After all calls, give me a summary with:
- Confirmed count
- Declined count
- Pending
- Any special notes`,
        tags: ["voice", "automation", "events"]
      },
      {
        id: 10,
        category: "automation",
        title: "Personal Knowledge Base (RAG)",
        description: "Build a searchable knowledge base from your资料",
        prompt: `I want to build a personal knowledge base:
1. When I share URLs, tweets, or articles, extract the key info and save it
2. Make it searchable via natural language
3. Cite sources when answering
4. Update when I share updated info

Use a simple file-based storage system I can search anytime.`,
        tags: ["knowledge", "rag", "memory"]
      },
      {
        id: 11,
        category: "outreach",
        title: "Follow-Up Email Template",
        description: "Follow up when you don't get a response",
        prompt: `Subject: Quick follow-up

Hi [Name],

Just following up on my last email about the AI receptionist.

I know you're busy - just wanted to see if you had any questions?

If it's not for you, no worries - just let me know either way.

Cheers,
[Your Name]`,
        tags: ["follow-up", "email", "outreach"]
      },
      {
        id: 12,
        category: "project",
        title: "Habit Tracker & Coach",
        description: "Proactive habit tracking with accountability",
        prompt: `Set up a habit tracking system:
1. Track my daily habits: [list your habits]
2. Every evening, ask me how I did
3. Maintain streak counts
4. If I miss a day, gently remind me
5. Adapt encouragement based on my progress`,
        tags: ["habits", "accountability", "tracking"]
      }
    ];

    // Render cards
    function renderCards(filtered) {
      const grid = document.getElementById('useCasesGrid');
      grid.innerHTML = filtered.map(uc => `
        <div class="card bg-zinc-900 border border-zinc-800 rounded-xl p-6 cursor-pointer" data-category="${uc.category}" onclick="showPrompt(${uc.id})">
          <div class="flex items-start justify-between mb-4">
            <span class="px-3 py-1 bg-orange-500/10 text-orange-500 rounded-full text-xs font-medium">${uc.category.replace('-', ' ')}</span>
            <button class="copy-btn p-2 hover:bg-zinc-800 rounded-lg" onclick="event.stopPropagation(); copyPrompt(${uc.id})">
              <i class="ph ph-copy text-zinc-400"></i>
            </button>
          </div>
          <h3 class="font-bold text-lg mb-2">${uc.title}</h3>
          <p class="text-zinc-400 text-sm mb-4">${uc.description}</p>
          <div class="flex flex-wrap gap-2">
            ${uc.tags.map(t => `<span class="px-2 py-1 bg-zinc-800 text-zinc-400 rounded text-xs">#${t}</span>`).join('')}
          </div>
        </div>
      `).join('');
      
      document.getElementById('count').textContent = `${filtered.length} Prompts`;
    }

    // Show prompt modal
    function showPrompt(id) {
      const uc = useCases.find(u => u.id === id);
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4';
      modal.onclick = () => modal.remove();
      modal.innerHTML = `
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 max-w-2xl w-full max-h-[80vh] overflow-y-auto" onclick="event.stopPropagation()">
          <div class="flex justify-between items-start mb-4">
            <h3 class="font-bold text-xl">${uc.title}</h3>
            <button onclick="this.closest('.fixed').remove()" class="text-zinc-400 hover:text-white"><i class="ph ph-x text-xl"></i></button>
          </div>
          <pre class="bg-zinc-950 p-4 rounded-lg text-sm text-zinc-300 whitespace-pre-wrap overflow-x-auto">${uc.prompt}</pre>
          <button onclick="copyPrompt(${uc.id}); this.closest('.fixed').remove()" class="mt-4 w-full bg-orange-500 hover:bg-orange-600 py-3 rounded-lg font-bold">
            <i class="ph ph-copy mr-2"></i> Copy Prompt
          </button>
        </div>
      `;
      document.body.appendChild(modal);
    }

    // Copy prompt
    function copyPrompt(id) {
      const uc = useCases.find(u => u.id === id);
      navigator.clipboard.writeText(uc.prompt).then(() => {
        alert('Prompt copied!');
      });
    }

    // Filter
    document.getElementById('filters').addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') {
        document.querySelectorAll('[data-filter]').forEach(b => {
          b.classList.remove('filter-active');
          b.classList.add('text-zinc-400');
        });
        e.target.classList.add('filter-active');
        e.target.classList.remove('text-zinc-400');
        
        const filter = e.target.dataset.filter;
        const filtered = filter === 'all' ? useCases : useCases.filter(uc => uc.category === filter);
        renderCards(filtered);
      }
    });

    // Search
    document.getElementById('search').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const filtered = useCases.filter(uc => 
        uc.title.toLowerCase().includes(query) || 
        uc.description.toLowerCase().includes(query) ||
        uc.prompt.toLowerCase().includes(query)
      );
      renderCards(filtered);
    });

    // Init
    renderCards(useCases);
  </script>
</body>
</html>
